# JHipster Development Environment
# Based on Eclipse Temurin JDK 21 with JHipster 8.11.0
# Includes: Java 21, Node.js 22, JHipster CLI
# All services run on isolated network with proper security controls

services:
  # JHipster development container - runs as non-root user (jhipster)
  jhipster-dev:
    build:
      context: .
      dockerfile: Dockerfile.jhipster
    container_name: jhipster-dev
    hostname: jhipster-dev
    networks:
      - jhipster-network
    volumes:
      # Project workspace
      - ../:/evergreen:rw
      # Git repository (shared with host for version control)
      - ../.git:/evergreen/.git:rw
      # Persistent caches for faster builds
      - maven-cache:/home/jhipster/.m2
      - npm-cache:/home/jhipster/.npm
    environment:
      # Maven configuration
      - MAVEN_OPTS=-Xmx2048m
      # Node.js configuration
      - NODE_ENV=development
      # Development environment markers
      - JHIPSTER_ENV=docker-dev
    working_dir: /evergreen
    stdin_open: true
    tty: true
    ports:
      # Spring Boot application
      - "8080:8080"
      # Webpack dev server (npm start)
      - "9000:9000"
      # BrowserSync
      - "9060:9060"
    # Security options - prevent privilege escalation
    security_opt:
      - no-new-privileges:true
    # Resource limits (prevent runaway processes)
    deploy:
      resources:
        limits:
          cpus: '8.0'
          memory: 8G
        reservations:
          cpus: '4.0'
          memory: 4G

networks:
  jhipster-network:
    driver: bridge
    # Isolated network for service communication
    internal: false
    ipam:
      config:
        - subnet: 172.29.0.0/16

volumes:
  # Persistent volumes for caches and data
  maven-cache:
    driver: local
  npm-cache:
    driver: local

